<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}autoresearch.studio{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <style>
        :root {
            --bg: #0d1117;
            --surface: #161b22;
            --border: #30363d;
            --text: #e6edf3;
            --text-dim: #8b949e;
            --green: #3fb950;
            --red: #f85149;
            --yellow: #d29922;
            --blue: #58a6ff;
            --purple: #bc8cff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        a { color: var(--blue); text-decoration: none; }
        a:hover { text-decoration: underline; }

        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

        header {
            border-bottom: 1px solid var(--border);
            padding: 16px 0;
            margin-bottom: 32px;
        }
        header .container {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        header h1 { font-size: 20px; font-weight: 600; }
        header .key-info { color: var(--text-dim); font-size: 13px; }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }
        .card h2 { font-size: 18px; margin-bottom: 12px; }
        .card h3 { font-size: 15px; color: var(--text-dim); margin-bottom: 8px; }

        .stats {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }
        .stat {
            text-align: center;
        }
        .stat-value {
            font-size: 28px;
            font-weight: 700;
            font-variant-numeric: tabular-nums;
        }
        .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            font-variant-numeric: tabular-nums;
        }
        th {
            text-align: left;
            padding: 8px 12px;
            border-bottom: 2px solid var(--border);
            color: var(--text-dim);
            font-size: 12px;
            text-transform: uppercase;
            font-weight: 600;
        }
        td {
            padding: 8px 12px;
            border-bottom: 1px solid var(--border);
        }
        tr:hover { background: rgba(255,255,255,0.02); }

        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .badge-keep { background: rgba(63,185,80,0.15); color: var(--green); }
        .badge-discard { background: rgba(139,148,158,0.15); color: var(--text-dim); }
        .badge-crash { background: rgba(248,81,73,0.15); color: var(--red); }
        .badge-running { background: rgba(210,153,34,0.15); color: var(--yellow); }

        .best-marker { color: var(--green); font-weight: 700; }

        .diff-block {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 16px;
            font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre;
            line-height: 1.6;
        }
        .diff-add { color: var(--green); }
        .diff-del { color: var(--red); }
        .diff-header { color: var(--purple); }

        .run-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }
        .run-tab {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text-dim);
            cursor: pointer;
        }
        .run-tab:hover { border-color: var(--text-dim); text-decoration: none; }
        .run-tab.active { background: var(--blue); color: #fff; border-color: var(--blue); }

        .login-form {
            max-width: 400px;
            margin: 80px auto;
        }
        .login-form input[type="text"] {
            width: 100%;
            padding: 10px 14px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 15px;
            margin-bottom: 12px;
        }
        .login-form button {
            padding: 10px 20px;
            background: var(--green);
            color: #fff;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            cursor: pointer;
            font-weight: 600;
        }
        .login-form button:hover { opacity: 0.9; }

        .back-link { margin-bottom: 16px; display: block; font-size: 14px; }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <h1><a href="/" style="color: var(--text);">autoresearch.studio</a></h1>
            {% block header_right %}{% endblock %}
        </div>
    </header>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
