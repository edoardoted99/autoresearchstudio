project:
  name: my-autoresearch
  description: Autonomous ML optimization experiment.
  goal: Get the highest val_accuracy.
files:
  editable:
  - train.py
  readonly:
  - prepare.py
experiment:
  run_command: python train.py
  timeout: 60
  setup_command: python prepare.py
  constraints: Keep the model small enough to train on CPU in the time budget. A GPU
    is not required for this example.
metric:
  name: val_accuracy
  pattern: ^val_accuracy:\s+([\d.]+)
  direction: maximize
  secondary:
  - name: val_loss
    pattern: ^val_loss:\s+([\d.]+)
  - name: num_params
    pattern: ^num_params:\s+([\d]+)
judge:
  threshold: 0.0
  simplicity_note: '**Simplicity criterion**: All else being equal, simpler is better.
    A tiny accuracy gain that adds ugly complexity is not worth it. Removing complexity
    while keeping accuracy is a great outcome.'
api:
  key: ars_4e6eb689f0651b26db01699c6ac18691512c0fc7f517283e
  endpoint: https://autoresearch.studio/api
